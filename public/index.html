<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日報作成</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #f5f6fa;
      color: #2c2c2c;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid #4a90e2;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #4a90e2;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    .section-sub {
      font-size: 0.78rem;
      color: #999;
      font-weight: 400;
      margin-left: 8px;
    }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: #444;
    }

    input[type="text"], input[type="time"], textarea, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 0.93rem;
      font-family: inherit;
      background: #fafafa;
      transition: border-color 0.2s;
      color: #2c2c2c;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #4a90e2;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 72px; }

    .field-group { margin-bottom: 14px; }

    .level-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Events */
    .event-row, .memo-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .event-row .time-input { width: 90px; flex-shrink: 0; }
    .event-row .title-input, .memo-row input { flex: 1; }
    .time-sep { font-size: 0.9rem; color: #aaa; flex-shrink: 0; }

    .btn-remove {
      background: none;
      border: 1px solid #ddd;
      border-radius: 5px;
      width: 28px; height: 28px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #999;
      flex-shrink: 0;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-remove:hover { background: #fee; border-color: #e55; color: #e55; }

    .btn-add {
      background: none;
      border: 1px dashed #aaa;
      border-radius: 7px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.82rem;
      color: #666;
      margin-top: 4px;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-add:hover { border-color: #4a90e2; color: #4a90e2; background: #f0f6ff; }

    /* Hints */
    .hints-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 560px) { .hints-grid { grid-template-columns: 1fr; } }

    .hint-label-sub {
      font-size: 0.75rem;
      color: #aaa;
      font-weight: 400;
      margin-left: 4px;
    }

    /* File upload */
    .file-drop-area {
      border: 2px dashed #c8d8f0;
      border-radius: 9px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f7faff;
      position: relative;
    }
    .file-drop-area:hover, .file-drop-area.drag-over {
      border-color: #4a90e2;
      background: #eef4ff;
    }
    .file-drop-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .file-drop-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .file-drop-text { font-size: 0.88rem; color: #666; }
    .file-drop-sub { font-size: 0.78rem; color: #aaa; margin-top: 4px; }
    .file-list { margin-top: 12px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #f0f4ff;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .file-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item-size { color: #999; font-size: 0.78rem; flex-shrink: 0; }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-submit:hover:not(:disabled) { background: #357abd; }
    .btn-submit:disabled { background: #b0c8e8; cursor: not-allowed; }

    /* Result */
    #result-area { display: none; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .btn-copy {
      background: #eaf2ff;
      border: 1px solid #b3d0f5;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a90e2;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-copy:hover { background: #d0e6ff; }
    .btn-copy.copied { background: #e8f7ee; border-color: #7ecfa0; color: #2e9e5a; }

    #report-output {
      background: #f8f9fc;
      border: 1px solid #e0e4ef;
      border-radius: 8px;
      padding: 16px;
      font-size: 0.92rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error-msg {
      color: #c0392b;
      background: #fdf0ee;
      border: 1px solid #f5c6c0;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>日報作成</h1>

    <!-- 基本情報 -->
    <div class="card">
      <div class="section-title">基本情報</div>
      <div class="field-group">
        <label for="today-goal">今日の目標 <span style="color:#e55">*</span></label>
        <textarea id="today-goal" placeholder="例：認証モジュールのユニットテストを追加し、カバレッジ90%以上を達成する"></textarea>
      </div>
      <div class="level-row">
        <div class="field-group">
          <label for="achievement">今日の目標の達成度</label>
          <select id="achievement">
            <option value="4">4 — 達成できた</option>
            <option value="3" selected>3 — 概ね達成できた</option>
            <option value="2">2 — あまり達成できなかった</option>
            <option value="1">1 — 達成できなかった</option>
          </select>
        </div>
        <div class="field-group">
          <label for="understanding">今日の研修の理解度</label>
          <select id="understanding">
            <option value="4">4 — 理解できた</option>
            <option value="3" selected>3 — 概ね理解できた</option>
            <option value="2">2 — あまり理解できなかった</option>
            <option value="1">1 — 理解できなかった</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 今日の予定 -->
    <div class="card">
      <div class="section-title">今日の予定<span class="section-sub">任意</span></div>
      <div id="events-list"></div>
      <button class="btn-add" onclick="addEvent()">＋ 予定を追加</button>
    </div>

    <!-- 作業メモ -->
    <div class="card">
      <div class="section-title">作業メモ<span class="section-sub">任意</span></div>
      <div id="memos-list"></div>
      <button class="btn-add" onclick="addMemo()">＋ メモを追加</button>
    </div>

    <!-- AIへのヒント -->
    <div class="card">
      <div class="section-title">AIへのヒント<span class="section-sub">キーワードでも文章でもOK / 空欄はAIが補完</span></div>
      <div class="hints-grid">
        <div class="field-group">
          <label>本日学んだことで特に印象に残っていること<span class="hint-label-sub">例: Reactのカスタムフック</span></label>
          <textarea id="hint-impression" rows="3" placeholder="キーワードや箇条書きでOK"></textarea>
        </div>
        <div class="field-group">
          <label>その理由<span class="hint-label-sub">例: 再利用できると分かった</span></label>
          <textarea id="hint-reason" rows="3" placeholder="なぜ印象に残ったかを簡単に"></textarea>
        </div>
        <div class="field-group">
          <label>本日の内容で難しいと感じたこと<span class="hint-label-sub">例: useEffectの依存配列</span></label>
          <textarea id="hint-difficulty" rows="3" placeholder="つまずいた箇所を簡単に"></textarea>
        </div>
        <div class="field-group">
          <label>明日の目標<span class="hint-label-sub">例: カスタムフックを自分で作る</span></label>
          <textarea id="hint-tomorrow" rows="3" placeholder="明日やりたいことを簡単に"></textarea>
        </div>
      </div>
    </div>

    <!-- 参考資料 -->
    <div class="card">
      <div class="section-title">参考資料<span class="section-sub">任意 / PDF・テキストファイルに対応</span></div>
      <div class="file-drop-area" id="drop-area">
        <input type="file" id="file-input" multiple accept=".txt,.md,.pdf,.csv,.log"
          onchange="updateFileList(this.files)" />
        <div class="file-drop-icon">📎</div>
        <div class="file-drop-text">クリックしてファイルを選択、またはここにドラッグ＆ドロップ</div>
        <div class="file-drop-sub">対応形式: PDF / テキスト (.txt .md .csv) ／ 最大10MB / 5ファイルまで</div>
      </div>
      <div class="file-list" id="file-list"></div>
    </div>

    <!-- 生成ボタン -->
    <div class="card">
      <button class="btn-submit" id="submit-btn" onclick="generate()">日報を生成する</button>
    </div>

    <!-- 結果 -->
    <div class="card" id="result-area">
      <div class="result-header">
        <div class="section-title" style="margin-bottom:0">生成された日報</div>
        <button class="btn-copy" id="copy-btn" onclick="copyReport()">コピー</button>
      </div>
      <div id="report-output"></div>
    </div>
  </div>

  <script>
    let eventCount = 0, memoCount = 0;

    function addEvent(title = "", start = "", end = "") {
      const id = ++eventCount;
      const div = document.createElement("div");
      div.className = "event-row";
      div.id = `event-${id}`;
      div.innerHTML = `
        <input type="time" class="time-input event-start" value="${start}" />
        <span class="time-sep">〜</span>
        <input type="time" class="time-input event-end" value="${end}" />
        <input type="text" class="title-input event-title" value="${title}" placeholder="予定名（例：朝会）" />
        <button class="btn-remove" onclick="removeRow('event-${id}')" title="削除">✕</button>`;
      document.getElementById("events-list").appendChild(div);
    }

    function addMemo(text = "") {
      const id = ++memoCount;
      const div = document.createElement("div");
      div.className = "memo-row";
      div.id = `memo-${id}`;
      div.innerHTML = `
        <input type="text" class="memo-text" value="${text}" placeholder="作業内容・気づき（例：バグを修正した）" />
        <button class="btn-remove" onclick="removeRow('memo-${id}')" title="削除">✕</button>`;
      document.getElementById("memos-list").appendChild(div);
    }

    function removeRow(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // Drag & drop
    const dropArea = document.getElementById("drop-area");
    dropArea.addEventListener("dragover", e => { e.preventDefault(); dropArea.classList.add("drag-over"); });
    dropArea.addEventListener("dragleave", () => dropArea.classList.remove("drag-over"));
    dropArea.addEventListener("drop", e => {
      e.preventDefault();
      dropArea.classList.remove("drag-over");
      const fileInput = document.getElementById("file-input");
      fileInput.files = e.dataTransfer.files;
      updateFileList(e.dataTransfer.files);
    });

    function updateFileList(files) {
      const list = document.getElementById("file-list");
      list.innerHTML = "";
      Array.from(files).forEach(file => {
        const size = file.size < 1024 * 1024
          ? `${Math.round(file.size / 1024)} KB`
          : `${(file.size / 1024 / 1024).toFixed(1)} MB`;
        const item = document.createElement("div");
        item.className = "file-item";
        item.innerHTML = `<span>📄</span><span class="file-item-name">${file.name}</span><span class="file-item-size">${size}</span>`;
        list.appendChild(item);
      });
    }

    async function generate() {
      const todayGoal = document.getElementById("today-goal").value.trim();
      if (!todayGoal) {
        alert("今日の目標を入力してください。");
        document.getElementById("today-goal").focus();
        return;
      }

      const events = Array.from(document.querySelectorAll(".event-row")).map(row => ({
        title: row.querySelector(".event-title").value.trim(),
        startTime: row.querySelector(".event-start").value,
        endTime: row.querySelector(".event-end").value,
      })).filter(e => e.title && e.startTime && e.endTime);

      const memos = Array.from(document.querySelectorAll(".memo-text"))
        .map(el => el.value.trim()).filter(t => t !== "");

      const formData = new FormData();
      formData.append("todayGoal", todayGoal);
      formData.append("achievementLevel", document.getElementById("achievement").value);
      formData.append("understandingLevel", document.getElementById("understanding").value);
      formData.append("events", JSON.stringify(events));
      formData.append("memos", JSON.stringify(memos));
      formData.append("hintImpression", document.getElementById("hint-impression").value.trim());
      formData.append("hintReason", document.getElementById("hint-reason").value.trim());
      formData.append("hintDifficulty", document.getElementById("hint-difficulty").value.trim());
      formData.append("hintTomorrowGoal", document.getElementById("hint-tomorrow").value.trim());

      const files = document.getElementById("file-input").files;
      Array.from(files).forEach(file => formData.append("files", file));

      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>生成中...';

      const resultArea = document.getElementById("result-area");
      const output = document.getElementById("report-output");
      resultArea.style.display = "none";

      try {
        const res = await fetch("/api/generate", { method: "POST", body: formData });
        const json = await res.json();
        if (!res.ok) {
          output.innerHTML = `<div class="error-msg">エラー: ${json.error ?? "不明なエラー"}</div>`;
        } else {
          output.textContent = json.report;
        }
        resultArea.style.display = "block";
        resultArea.scrollIntoView({ behavior: "smooth" });
      } catch (err) {
        output.innerHTML = `<div class="error-msg">通信エラー: ${err.message}</div>`;
        resultArea.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "日報を生成する";
      }
    }

    async function copyReport() {
      const text = document.getElementById("report-output").textContent;
      await navigator.clipboard.writeText(text);
      const btn = document.getElementById("copy-btn");
      btn.textContent = "コピーしました！";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "コピー"; btn.classList.remove("copied"); }, 2000);
    }

    addEvent();
    addMemo();
  </script>
</body>
</html>
